<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>开启 · 第一章</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap');

  :root {
    --bg:        #0e0e0e;
    --text:      #d4cfc8;
    --text-dim:  #6b6660;
    --text-faint:#3a3835;
    --accent:    #c9b99a;
    --border:    #2a2825;
    --choice-bg: #161412;
    --choice-hover: #1e1c1a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif SC', 'Source Han Serif CN', 'SimSun', serif;
    font-weight: 300;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 80px 0;
  }

  /* ── 顶部标题栏 ── */
  #header {
    width: 100%;
    max-width: 640px;
    padding: 48px 32px 0;
    opacity: 0;
    animation: fadeUp 1s ease 0.2s forwards;
  }

  #game-title {
    font-size: 11px;
    letter-spacing: 0.5em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  #chapter-title {
    font-size: 15px;
    letter-spacing: 0.25em;
    color: var(--accent);
    font-weight: 300;
    min-height: 22px;
  }

  /* ── 分隔线 ── */
  .divider {
    width: 100%;
    max-width: 640px;
    height: 1px;
    background: var(--border);
    margin: 24px 32px;
    opacity: 0;
    animation: fadeIn 0.8s ease 0.5s forwards;
  }

  /* ── 正文区 ── */
  #text-area {
    width: 100%;
    max-width: 640px;
    padding: 0 32px;
    line-height: 2.2;
    font-size: 15px;
    transition: opacity 0.4s ease;
  }

  #text-area p {
    margin-bottom: 1.4em;
    opacity: 0;
  }

  #text-area p.scene-label {
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    margin: 2em 0 1.8em;
  }

  #text-area p.dialogue {
    color: var(--text);
    padding-left: 0;
  }

  #text-area p.separator {
    text-align: center;
    color: var(--text-faint);
    letter-spacing: 0.3em;
    margin: 2em 0;
  }

  /* ── 选项区 ── */
  #choices-area {
    width: 100%;
    max-width: 640px;
    padding: 8px 32px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .choice-btn {
    background: var(--choice-bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.05em;
    line-height: 1.8;
    padding: 14px 20px;
    text-align: left;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    opacity: 0;
  }

  .choice-btn:hover {
    background: var(--choice-hover);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── 继续按钮 ── */
  #continue-btn-area {
    width: 100%;
    max-width: 640px;
    padding: 24px 32px 0;
  }

  #continue-btn {
    background: none;
    border: none;
    color: var(--text-dim);
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 0.4em;
    cursor: pointer;
    padding: 8px 0;
    transition: color 0.2s ease;
    display: block;
  }

  #continue-btn:hover { color: var(--accent); }
  #continue-btn.hidden { display: none; }

  #chapter-end {
    color: var(--text-dim);
    font-size: 12px;
    letter-spacing: 0.4em;
    padding: 8px 0;
    opacity: 0;
    animation: fadeIn 0.8s ease forwards;
  }

  /* ── 结尾画面 ── */
  #ending-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    text-align: center;
    padding: 40px 32px;
    opacity: 0;
  }

  #ending-screen.visible {
    display: flex;
    animation: fadeIn 1.2s ease forwards;
  }

  #ending-title {
    font-size: 12px;
    letter-spacing: 0.5em;
    color: var(--text-dim);
    margin-bottom: 24px;
  }

  #ending-text {
    font-size: 14px;
    line-height: 2.4;
    color: var(--text-dim);
    max-width: 400px;
  }

  #restart-btn {
    margin-top: 48px;
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.4em;
    padding: 10px 24px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  #restart-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── 动画 ── */
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .fade-in {
    animation: fadeUp 0.6s ease forwards;
  }
</style>
</head>
<body>

<div id="header">
  <div id="game-title">开　启</div>
  <div id="chapter-title"></div>
</div>
<div class="divider"></div>
<div id="text-area"></div>
<div id="choices-area"></div>
<div id="continue-btn-area">
  <button id="continue-btn" class="hidden">继　续</button>
</div>

<div id="ending-screen">
  <div id="ending-title">· 第一章 完 ·</div>
  <div id="ending-text">故事还在继续。</div>
  <button id="restart-btn" onclick="restartGame()">重新开始</button>
</div>

/* ── 引擎 ── */
let currentSceneId = 1;

const chapterTitle    = document.getElementById('chapter-title');
const textArea        = document.getElementById('text-area');
const choicesArea     = document.getElementById('choices-area');
const continueBtnArea = document.getElementById('continue-btn-area');
const endingScreen    = document.getElementById('ending-screen');

function renderScene(sceneId) {
  const scene = scenes[sceneId];

  if (!scene || (scene.next === null && scene.content.length === 0)) {
    showEnding();
    return;
  }

  currentSceneId = sceneId;

  const oldEnd = document.getElementById('chapter-end');
  if (oldEnd) oldEnd.remove();

  if (scene.title) chapterTitle.textContent = scene.title;

  textArea.innerHTML    = '';
  choicesArea.innerHTML = '';

  scene.content.forEach((line, i) => {
    const p = document.createElement('p');
    if (line === '—') {
      p.className   = 'separator';
      p.textContent = '⸻';
    } else if (line.startsWith('▷')) {
      p.className   = 'scene-label';
      p.textContent = line.slice(1).trim();
    } else if (line.startsWith('「') || line.startsWith('"')) {
      p.className   = 'dialogue';
      p.textContent = line;
    } else {
      p.textContent = line;
    }
    p.style.animationDelay = `${i * 0.045}s`;
    p.classList.add('fade-in');
    textArea.appendChild(p);
  });

  if (scene.choices && scene.choices.length > 0) {
    showChoices(scene.choices);
  } else {
    showContinue(scene.next);
  }
}

function showChoices(choices) {
  const oldBtn = document.getElementById('continue-btn');
  if (oldBtn) oldBtn.classList.add('hidden');
  choicesArea.innerHTML = '';

  choices.forEach((choice, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn fade-in';
    btn.style.animationDelay = `${0.5 + i * 0.08}s`;
    btn.textContent = choice.text;
    btn.addEventListener('click', () => {
      fadeTransition(() => renderScene(choice.next));
    });
    choicesArea.appendChild(btn);
  });
}

function showContinue(nextId) {
  choicesArea.innerHTML = '';

  if (nextId === null || nextId === undefined) {
    const oldBtn = document.getElementById('continue-btn');
    if (oldBtn) oldBtn.classList.add('hidden');
    const end = document.createElement('div');
    end.id = 'chapter-end';
    end.textContent = '── 第一章  完 ──';
    end.classList.add('fade-in');
    continueBtnArea.appendChild(end);

    setTimeout(() => showEnding(), 2000);
    return;
  }

  const oldBtn = document.getElementById('continue-btn');
  const newBtn = oldBtn.cloneNode(true);
  oldBtn.parentNode.replaceChild(newBtn, oldBtn);
  newBtn.classList.remove('hidden');
  newBtn.addEventListener('click', () => {
    fadeTransition(() => renderScene(nextId));
  });
}

function fadeTransition(callback) {
  textArea.style.transition     = 'opacity 0.35s ease';
  chapterTitle.style.transition = 'opacity 0.35s ease';
  textArea.style.opacity        = '0';
  chapterTitle.style.opacity    = '0';
  setTimeout(() => {
    callback();
    window.scrollTo({ top: 0, behavior: 'smooth' });
    requestAnimationFrame(() => {
      textArea.style.opacity     = '1';
      chapterTitle.style.opacity = '1';
    });
  }, 380);
}

function showEnding() {
  document.getElementById('header').style.opacity = '0';
  document.querySelector('.divider').style.opacity = '0';
  textArea.style.opacity = '0';
  choicesArea.innerHTML = '';
  continueBtnArea.innerHTML = '';

  setTimeout(() => {
    textArea.style.display = 'none';
    endingScreen.classList.add('visible');
  }, 500);
}

function restartGame() {
  endingScreen.classList.remove('visible');
  endingScreen.style.display = 'none';
  textArea.style.display = '';
  textArea.style.opacity = '1';
  document.getElementById('header').style.opacity = '1';
  document.querySelector('.divider').style.opacity = '1';

  const btn = document.createElement('button');
  btn.id = 'continue-btn';
  btn.className = 'hidden';
  btn.textContent = '继　续';
  continueBtnArea.innerHTML = '';
  continueBtnArea.appendChild(btn);

  renderScene(1);
}

/* ── 启动 ── */
window.addEventListener('DOMContentLoaded', () => {
  renderScene(1);
});
</script>
</body>
</html>
